name: Daily Job Hunt

on:
  schedule:
    # 10:00 AM IST = 04:30 UTC
    - cron: '0 */6 * * *'   
  workflow_dispatch:   # manual trigger from GitHub UI for testing

jobs:
  job-hunt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install openpyxl pdfminer.six

      - name: Run AI job search + generate Excel
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python scripts/generate_excel.py

      - name: Send email with Excel attachment
        env:
          GMAIL_USER:     ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
        run: python scripts/send_email.py

      - name: Upload Excel as workflow artifact (30-day backup)
        uses: actions/upload-artifact@v4
        with:
          name: job-hunt-${{ github.run_id }}
          path: "jobs_*.xlsx"
          retention-days: 30
