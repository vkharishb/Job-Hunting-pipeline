name: 🎯 Daily Job Hunt

on:
  schedule:
     # it will auto trigger on schedule for 10 AM  and 10:00 PM IST
    - cron: 30 4,16 * * *
  workflow_dispatch:   # manual trigger from GitHub UI

jobs:
  job-hunt:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # silence Node.js 20 warning

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        run: pip install openpyxl pdfminer.six

      - name: 🤖 Run AI job search + generate Excel
        id: generate
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python scripts/generate_excel.py

      - name: 📧 Send email with Excel attachment
        id: send_email
        env:
          GMAIL_USER:     ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
        run: python scripts/send_email.py

      - name: 📁 Upload Excel as workflow artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: job-hunt-${{ github.run_id }}
          path: "jobs_*.xlsx"
          retention-days: 30

      - name: 🚨 Send failure notification email
        if: failure()
        env:
          GMAIL_USER:     ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
          RUN_ID:         ${{ github.run_id }}
          RUN_URL:        ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          FAILED_STEP:    ${{ steps.generate.outcome == 'failure' && 'Run AI job search + generate Excel' || steps.send_email.outcome == 'failure' && 'Send email with Excel attachment' || 'Unknown step' }}
        run: python scripts/send_failure_email.py
