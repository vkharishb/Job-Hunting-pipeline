name: 🎯 Daily Job Hunt

on:
  schedule:
    # 10:00 AM IST = 04:30 UTC
    # Change this for your timezone — see README for timezone table
    - cron: "30 4 * * *"
  workflow_dispatch:  # manual trigger from GitHub UI — use this to test!

jobs:
  job-hunt:
    runs-on: ubuntu-latest   # free tier — no cost

    steps:
      - name: ⬇️ Checkout repo (includes resume.pdf + prompt.txt)
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        run: pip install anthropic openpyxl

      - name: 🤖 Run AI job search + generate Excel
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_excel.py

      - name: 📧 Send email with Excel attachment
        env:
          GMAIL_USER:     ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
        run: python scripts/send_email.py

      - name: 📁 Upload Excel as workflow artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: job-hunt-${{ github.run_id }}
          path: "jobs_*.xlsx"
          retention-days: 30   # keep 30 days of history in GitHub itself
